<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom FM Xtra - Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #fbbf24; /* Gold color */
            font-size: 3em;
            margin-bottom: 20px;
        }
        .logo {
            width: 200px;
            height: 200px;
            background: #fbbf24;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: #1a365d;
        }
        .status {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kingdom FM Xtra</h1>
        <div class="logo">KFMX</div>
        <p>✅ Server is working!</p>
        <p>🎨 New colors applied successfully</p>
        <p>🚀 If you can see this page, the network connection is working!</p>
        <div class="status">LIVE</div>
    </div>
</body>
</html>
