# Cloudflare Pages Configuration
name = "kingdomfm-player"
compatibility_date = "2024-01-01"

# Build configuration
[build]
command = "npm run build"
cwd = "/"
watch_dirs = ["src"]

# Deployment configuration
[env.production]
routes = [
  { pattern = "player.kingdomfm.live", custom_domain = true }
]

# Environment variables (optional)
[vars]
NODE_ENV = "production"